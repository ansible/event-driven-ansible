- name: Create project in check mode
  ansible.eda.project:
    name: "{{ project_name }}"
    url: "{{ url }}"
    description: "Example project description"
    organization_name: Default
    update_revision_on_launch: false
    state: present
  check_mode: true
  register: r

- name: Check project creation in check mode
  assert:
    that:
      - r.changed

- name: Create project
  ansible.eda.project:
    name: "{{ project_name }}"
    description: "Example project description"
    url: "{{ url }}"
    proxy: "{{ proxy }}"
    organization_name: Default
    update_revision_on_launch: false
    state: present
  register: r

- name: Check project creation
  assert:
    that:
      - r.changed

- name: Create project again
  ansible.eda.project:
    name: "{{ project_name }}"
    description: "Example project description"
    url: "{{ url }}"
    proxy: "{{ proxy }}"
    organization_name: Default
    state: present
  register: r

- name: Check project is not created again
  assert:
    that:
      - not r.changed

- name: Delete project in check mode
  ansible.eda.project:
    name: "{{ project_name }}"
    state: absent
  check_mode: true
  register: r

- name: Check if delete project in check mode
  assert:
    that:
      - r.changed

- name: Delete project
  ansible.eda.project:
    name: "{{ project_name }}"
    state: absent
  register: r

- name: Check if delete project
  assert:
    that:
      - r.changed

- name: Check create project with partial name match
  loop:
    - "{{ project_name }}_test_partial"
    - "{{ project_name }}"
  ansible.eda.project:
    name: "{{ item }}"
    url: "{{ url }}"
    description: "Example project description"
    organization_name: Default
    state: present
  register: r

- name: Check if create projects with partial name match
  loop: "{{ r.results }}"
  assert:
    that:
      - item.changed

- name: Delete project with partial name match
  loop:
    - "{{ project_name }}"
    - "{{ project_name }}_test_partial"
  ansible.eda.project:
    name: "{{ item }}"
    state: absent
  retries: 3
  delay: 2
  until: r is not failed
  register: r
  ignore_errors: true

- name: Check create project with missing url
  ansible.eda.project:
    name: "{{ project_name }}"
    description: "Example project description"
    organization_name: Default
    state: present
  register: r
  ignore_errors: true

- name: Check if missing url is required
  assert:
    that:
      - r.failed
      - "'Parameter url is required' in r.msg"

- name: Create project with update_revision_on_launch enabled
  ansible.eda.project:
    name: "{{ project_name }}_update_revision_on_launch"
    url: "{{ url }}"
    description: "Project with auto-sync enabled"
    organization_name: Default
    update_revision_on_launch: true
    scm_update_cache_timeout: 3600
    state: present
  register: r

- name: Check project creation with auto-sync
  assert:
    that:
      - r.changed

- name: Get project info to verify auto-sync parameters
  ansible.eda.project_info:
    name: "{{ project_name }}_update_revision_on_launch"
  register: r_info

- name: Verify update_revision_on_launch and scm_update_cache_timeout are set
  assert:
    that:
      - r_info.projects | length > 0
      - r_info.projects[0].update_revision_on_launch is true
      - r_info.projects[0].scm_update_cache_timeout == 3600

- name: Update project with different auto-sync timeout
  ansible.eda.project:
    name: "{{ project_name }}_update_revision_on_launch"
    url: "{{ url }}"
    description: "Project with updated auto-sync timeout"
    organization_name: Default
    update_revision_on_launch: true
    scm_update_cache_timeout: 7200
    state: present
  register: r

- name: Check project update
  assert:
    that:
      - r.changed

- name: Get project info after update
  ansible.eda.project_info:
    name: "{{ project_name }}_update_revision_on_launch"
  register: r_info

- name: Verify auto-sync parameters are updated
  assert:
    that:
      - r_info.projects | length > 0
      - r_info.projects[0].update_revision_on_launch is true
      - r_info.projects[0].scm_update_cache_timeout == 7200

- name: Delete project with auto-sync
  ansible.eda.project:
    name: "{{ project_name }}_update_revision_on_launch"
    state: absent
  register: r

- name: Check if delete project with auto-sync
  assert:
    that:
      - r.changed
