- name: Create project
  ansible.eda.project:
    name: "{{ project_name }}"
    url: "{{ url }}"
    description: "Example project description"
    organization_name: Default
    state: present
  register: r

- name: Check project creation
  assert:
    that:
      - r.changed

- name: Update project name
  ansible.eda.project:
    name: "{{ project_name }}"
    url: "{{ url }}"
    new_name: "{{ project_name }}_new"
    description: "Example project description"
    organization_name: Default
    state: present
  register: r

- name: Check project update
  assert:
    that:
      - r.changed

- name: Update project url
  ansible.eda.project:
    name: "{{ project_name }}_new"
    new_name: "{{ project_name }}_new"
    description: "Example project description"
    url: "https://github.com/ansible/event-driven-ansible"
    proxy: "{{ proxy }}"
    organization_name: Default
    state: present
  register: r

- name: Check project update
  assert:
    that:
      - r.changed

- name: Update project again
  ansible.eda.project:
    name: "{{ project_name }}_new"
    new_name: "{{ project_name }}_new"
    description: "Example project description"
    url: "https://github.com/ansible/event-driven-ansible"
    proxy: "{{ proxy }}"
    organization_name: Default
    state: present
  register: r

- name: Check project is not updated again
  assert:
    that:
      - not r.changed

- name: Wait for project sync to complete before delete
  ansible.eda.project_info:
    name: "{{ project_name }}_new"
  register: project_info
  until: project_info.projects[0].import_state == "completed"
  failed_when: project_info.projects[0].import_state == "failed"
  retries: 30
  delay: 2

- name: Delete updated project
  ansible.eda.project:
    name: "{{ project_name }}_new"
    state: absent
  register: r
  retries: 3
  delay: 2
  until: r is not failed

- name: Check if delete project
  assert:
    that:
      - r.changed
