- name: Create project
  ansible.eda.project:
    name: "{{ project_name }}"
    url: "{{ url }}"
    description: "Example project description"
    organization_name: Default
    state: present
  register: r

- name: Check project creation
  assert:
    that:
      - r.changed

- name: Update project name
  ansible.eda.project:
    name: "{{ project_name }}"
    url: "{{ url }}"
    new_name: "{{ project_name }}_new"
    description: "Example project description"
    organization_name: Default
    state: present
  register: r

- name: Check project update
  assert:
    that:
      - r.changed

- name: Update project url
  ansible.eda.project:
    name: "{{ project_name }}_new"
    new_name: "{{ project_name }}_new"
    description: "Example project description"
    url: "https://github.com/ansible/event-driven-ansible"
    proxy: "{{ proxy }}"
    organization_name: Default
    state: present
  register: r

- name: Check project update
  assert:
    that:
      - r.changed

- name: Update project again
  ansible.eda.project:
    name: "{{ project_name }}_new"
    new_name: "{{ project_name }}_new"
    description: "Example project description"
    url: "https://github.com/ansible/event-driven-ansible"
    proxy: "{{ proxy }}"
    organization_name: Default
    state: present
  register: r

- name: Check project is not updated again
  assert:
    that:
      - not r.changed

- name: Delete updated project
  ansible.eda.project:
    name: "{{ project_name }}_new"
    state: absent
  register: r

- name: Check if delete project
  assert:
    that:
      - r.changed

- name: Create project with auto-sync parameters
  ansible.eda.project:
    name: "{{ project_name }}_autosync"
    url: "{{ url }}"
    description: "Project with auto-sync enabled"
    organization_name: Default
    update_revision_on_launch: true
    scm_update_cache_timeout: 300
    state: present
  register: r

- name: Check project with auto-sync created
  assert:
    that:
      - r.changed
      - r.id is defined

- name: Update project auto-sync settings
  ansible.eda.project:
    name: "{{ project_name }}_autosync"
    url: "{{ url }}"
    description: "Project with auto-sync updated"
    organization_name: Default
    update_revision_on_launch: false
    scm_update_cache_timeout: 0
    state: present
  register: r

- name: Check project auto-sync updated
  assert:
    that:
      - r.changed

- name: Update project auto-sync settings again (idempotency)
  ansible.eda.project:
    name: "{{ project_name }}_autosync"
    url: "{{ url }}"
    description: "Project with auto-sync updated"
    organization_name: Default
    update_revision_on_launch: false
    scm_update_cache_timeout: 0
    state: present
  register: r

- name: Check project auto-sync not updated (idempotent)
  assert:
    that:
      - not r.changed

- name: Delete auto-sync project
  ansible.eda.project:
    name: "{{ project_name }}_autosync"
    state: absent
  register: r

- name: Check if delete auto-sync project
  assert:
    that:
      - r.changed
