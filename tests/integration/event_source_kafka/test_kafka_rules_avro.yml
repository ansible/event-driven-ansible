- name: test kafka source plugin with avro message format
  hosts: localhost
  sources:
    - ansible.eda.kafka:
        topic: kafka-events-avro
        host: localhost
        port: 9092
        offset: earliest
        message_format: avro
        avro_schema_file: "{{ avro_schema_file }}"
  rules:
    - name: match avro event
      condition: event.body.name == "Produced for Avro consumers"
      action:
        debug:
          msg: "Rule fired successfully for Avro consumers"

    - name: stop
      condition: event.body.name == "stop"
      action:
        shutdown:
