---
- name: Test Kafka Avro with Schema Registry
  hosts: localhost
  sources:
    - ansible.eda.kafka:
        topic: "{{ kafka_avro_topic }}"
        host: "{{ kafka_avro_host }}"
        port: "{{ kafka_avro_port }}"
        offset: "{{ kafka_avro_offset }}"
        group_id: "{{ kafka_avro_group_id }}"
        cafile: "{{ eda.filename.cafile | default('', true) }}"
        certfile: "{{ eda.filename.certfile | default('', true) }}"
        keyfile: "{{ eda.filename.keyfile | default('', true) }}"
        password: "{{ password | default('', true) }}"
        message_format: "{{ message_format }}"
        avro_schema_file: "{{ eda.filename.avro_schema_file | default('', true) }}"
        schema_registry_url: "{{ schema_registry_url }}"
        schema_ssl_cafile: "{{ eda.filename.schema_registry_cafile | default('', true) }}"
        schema_ssl_certfile: "{{ eda.filename.schema_registry_certfile | default('', true) }}"
        schema_ssl_keyfile: "{{ eda.filename.schema_registry_keyfile | default('', true) }}"
  rules:
    - name: match avro event from schema registry
      condition: event.body.name == "Avro Schema Registry Test"
      action:
        debug:
          msg: "Rule fired successfully - Avro + Schema Registry works! value={{ event.body.value }}"

    - name: match any avro event
      condition: event.body.name is defined and event.body.name != "stop"
      action:
        debug:
          msg: "Received Avro event: name={{ event.body.name }}, value={{ event.body.value }}"

    - name: stop
      condition: event.body.name == "stop"
      action:
        shutdown:
